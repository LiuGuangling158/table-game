version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: table-games-db
    environment:
      POSTGRES_USER: tablegames
      POSTGRES_PASSWORD: tablegames123
      POSTGRES_DB: table_games
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: table-games-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
